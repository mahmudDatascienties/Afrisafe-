<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AfriSafe AI — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/assessment.css">
  <style>
    .profile-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-card);
      box-shadow: var(--glass-shadow);
      padding: 2.5rem;
      max-width: 640px;
      margin: 0 auto;
    }
    .profile-header {
      display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem;
      padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-color);
    }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-green), var(--medical-blue));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 800; flex-shrink: 0;
    }
    .profile-name { font-size: 1.5rem; font-weight: 800; }
    .profile-email { font-size: 0.9rem; color: var(--text-muted); }
    .profile-role-badge {
      display: inline-block; margin-top: 0.5rem; padding: 3px 10px;
      border-radius: 12px; font-size: 0.75rem; font-weight: 700;
      background: rgba(15,157,88,0.1); color: var(--primary-green);
    }
    .profile-field { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid var(--border-color); }
    .profile-field:last-child { border-bottom: none; }
    .profile-field-label { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
    .profile-field-value { font-size: 0.95rem; font-weight: 700; text-align: right; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border-color);
      border-top-color: var(--primary-green); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 4rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="ambient-background">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <header class="navbar">
    <div class="nav-container">
      <a href="dashboard.html" class="brand-group" style="text-decoration:none;color:inherit;">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"></path>
            <path d="M12 6v6l4 2"></path>
          </svg>
        </div>
        <div class="brand-name">AfriSafe <span class="brand-badge">AI</span></div>
      </a>
      <nav class="nav-links" aria-label="Main Navigation">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="assessment.html" class="nav-link">Assessment</a>
        <a href="history.html" class="nav-link">History</a>
        <a href="profile.html" class="nav-link active" aria-current="page">Profile</a>
      </nav>
      <div class="nav-actions">
        <div class="user-badge" title="Active Session">
          <span class="status-dot" aria-hidden="true"></span>
          <span class="user-text">User</span>
        </div>
        <a href="#" id="logoutBtn" class="nav-link" style="color: var(--danger);">Logout</a>
      </div>
    </div>
  </header>

  <main class="main-layout" style="grid-template-columns: 1fr;">
    <div id="loadingState" class="spinner"></div>

    <div id="profileContent" style="display:none;">
      <div class="profile-card">
        <div class="profile-header">
          <div class="profile-avatar" id="profileAvatar">U</div>
          <div>
            <div class="profile-name" id="profileName">--</div>
            <div class="profile-email" id="profileEmail">--</div>
            <span class="profile-role-badge" id="profileRole">User</span>
          </div>
        </div>

        <div class="profile-field">
          <span class="profile-field-label">Full Name</span>
          <span class="profile-field-value" id="fieldFullName">--</span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">Email</span>
          <span class="profile-field-value" id="fieldEmail">--</span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">Age</span>
          <span class="profile-field-value" id="fieldAge">--</span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">Gender</span>
          <span class="profile-field-value" id="fieldGender">--</span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">State</span>
          <span class="profile-field-value" id="fieldState">--</span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">LGA</span>
          <span class="profile-field-value" id="fieldLga">--</span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">Phone Number</span>
          <span class="profile-field-value" id="fieldPhone">--</span>
        </div>
        <div class="profile-field">
          <span class="profile-field-label">Member Since</span>
          <span class="profile-field-value" id="fieldJoined">--</span>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (!requireAuth()) return;
      populateUserBadge();
      wireLogout();

      try {
        const user = await apiRequest("/api/v1/auth/me");
        renderProfile(user);
      } catch (err) {
        // Fallback to cached user data
        const cached = getUser();
        if (cached) {
          renderProfile(cached);
        } else {
          document.getElementById("loadingState").style.display = "none";
          showToast(err.message || "Failed to load profile.", "error");
        }
      }
    });

    function renderProfile(user) {
      document.getElementById("loadingState").style.display = "none";
      document.getElementById("profileContent").style.display = "block";

      const fullName = user.full_name || "--";
      const email = user.email || "--";

      document.getElementById("profileName").textContent = fullName;
      document.getElementById("profileEmail").textContent = email;
      document.getElementById("profileRole").textContent = (user.role || "user").charAt(0).toUpperCase() + (user.role || "user").slice(1);
      document.getElementById("profileAvatar").textContent = fullName.charAt(0).toUpperCase();

      document.getElementById("fieldFullName").textContent = fullName;
      document.getElementById("fieldEmail").textContent = email;
      document.getElementById("fieldAge").textContent = user.age || "--";
      document.getElementById("fieldGender").textContent = user.gender || "--";
      document.getElementById("fieldState").textContent = user.state || "--";
      document.getElementById("fieldLga").textContent = user.lga || "--";
      document.getElementById("fieldPhone").textContent = user.phone_number || "Not provided";
      document.getElementById("fieldJoined").textContent = formatDate(user.created_at);
    }
  </script>
</body>
</html>
